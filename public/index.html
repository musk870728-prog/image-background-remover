<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="快速移除图片背景的在线工具，支持 JPG、PNG、WebP 格式">
  <title>图片背景移除 - Image Background Remover</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: #667eea;
      background: #f0f4ff;
    }

    .upload-area input[type="file"] {
      display: none;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
      color: #999;
    }

    .upload-text {
      color: #666;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: #999;
      font-size: 12px;
    }

    .spinner {
      display: none;
      text-align: center;
      margin: 30px 0;
    }

    .spinner-icon {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    .spinner-text {
      color: #666;
      font-size: 14px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .result {
      display: none;
      margin-top: 30px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .result-preview {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      background: repeating-conic-gradient(#f5f5f5 0% 25%, #fff 0% 50%) 50% / 20px 20px;
      margin-bottom: 16px;
    }

    .result-preview img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .button {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .button:active {
      transform: translateY(0);
    }

    .error {
      display: none;
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      color: #c33;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 24px;
      }

      .upload-area {
        padding: 30px 16px;
      }

      .button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧐 图片背景移除</h1>
      <p>上传图片，一键移除背景</p>
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp">
      <div class="upload-icon">📷</div>
      <div class="upload-text">点击或拖拽图片到此处</div>
      <div class="upload-hint">支持 JPG、PNG、WebP 格式，最大 5MB</div>
    </div>

    <div class="spinner" id="spinner">
      <div class="spinner-icon"></div>
      <div class="spinner-text">正在处理图片，请稍候...</div>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <span class="result-title">处理完成</span>
      </div>
      <div class="result-preview">
        <img id="resultImage" alt="处理后的图片">
      </div>
      <a id="downloadBtn" class="button" download>下载图片</a>
    </div>

    <div class="error" id="error"></div>

    <div class="footer">
      <a href="https://github.com/yourname/image-background-remover" target="_blank">View on GitHub</a>
    </div>
  </div>

  <script>
    // 配置 Worker API 地址（部署时替换为实际地址）
    const API_URL = '/api/remove-bg';

    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const errorDiv = document.getElementById('error');

    let blobUrl = null;

    // 点击上传区域触发文件选择
    uploadArea.addEventListener('click', () => {
      imageInput.click();
    });

    // 文件选择事件
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        processImage(file);
      }
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        processImage(file);
      } else if (file) {
        showError('请上传有效的图片文件');
      }
    });

    // 处理图片
    async function processImage(file) {
      // 清理之前的资源
      hideError();
      hideResult();

      // 客户端验证
      if (file.size > 5 * 1024 * 1024) {
        showError('图片太大，请上传 5MB 以内的图片');
        return;
      }

      if (
!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)
) {
        showError('不支持的图片格式，请使用 JPG、PNG 或 WebP');
        return;
      }

      // 显示加载状态
      showSpinner();

      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || '处理失败，请重试');
        }

        // 获取处理后的图片
        const blob = await response.blob();

        // 清理之前的 blob URL
        if (blobUrl) {
          URL.revokeObjectURL(blobUrl);
        }

        // 创建新的 blob URL
        blobUrl = URL.createObjectURL(blob);

        // 显示结果
        resultImage.src = blobUrl;
        downloadBtn.href = blobUrl;
        downloadBtn.download = `removed-bg-${Date.now()}.png`;

        hideSpinner();
        showResult();

      } catch (error) {
        console.error('Error:', error);
        hideSpinner();
        showError(error.message || '处理失败，请检查网络连接后重试');
      }
    }

    function showSpinner() {
      spinner.style.display = 'block';
      uploadArea.style.display = 'none';
    }

    function hideSpinner() {
      spinner.style.display = 'none';
      uploadArea.style.display = 'block';
    }

    function showResult() {
      resultDiv.style.display = 'block';
    }

    function hideResult() {
      resultDiv.style.display = 'none';
    }

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
    }
  </script>
</body>
</html>
