name = "image-background-remover"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# 账号配置（可选，wrangler login 后自动使用默认账号）
# account_id = "your-account-id"

# Workers 路由配置（可选）
# routes = [
#   { pattern = "https://bg-remover.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# 环境变量（通过 wrangler secret 设置，不要在这里填写敏感信息）
# [vars]
# ENVIRONMENT = "production"

# KV 命名空间绑定（如果需要缓存或存储）
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# 限制配置
[limits]
cpu_ms = 10000

# 构建配置
[build]
command = "npm install"

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"
upstream_protocol = "https"